<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssignMate | Edit Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style-editprofile.css') }}">
</head>
<body>

    <div class="editprofile-card">
        <h1>Edit Profile</h1>
        
        <form class="profile-form" action="{{ url_for('editprofile') }}" method="POST" enctype="multipart/form-data">
            
            <div class="avatar-wrapper">
                {% if user and user.profile_pic %}
                    <img src="{{ url_for('uploaded_file', filename=user.profile_pic) }}" alt="Profile" class="avatar" id="profile-pic">
                {% else %}
                    <img src="https://ui-avatars.com/api/?name={{ user.username if user else 'User' }}&background=random" alt="Profile" class="avatar" id="profile-pic">
                {% endif %}
                
                <label for="upload-photo" class="edit-icon">
                    ✎
                    <input type="file" id="upload-photo" name="profile_pic" style="display:none" accept="image/*">
                </label>
            </div>

            <div class="profile-info">
                <h3 id="display-name">{{ user.username if user else 'Name' }}'s AssignMate</h3>
                <p>MMU STUDENT</p>
            </div>
        
            <div class="input-group">
                <label for="input-name">Full Name:</label>
                <input type="text" name="full_name" placeholder="Name" id="input-name" value="{{ user.full_name if user else '' }}">
            </div>

            <div class="input-group">
                <label for="username">Username:</label>
                <input type="text" name="username" placeholder="Username" id="username" value="{{ user.username if user else '' }}">
            </div>

            <div class="input-group">
                <label for="bio">Bio:</label>
                <input type="text" name="bio" placeholder="Bio" value="{{ user.bio if user else '' }}">
            </div>

            <label class="gender-label">Enter your gender:</label>
            <div class="gender-group">
                <input type="radio" name="gender" value="male" id="male" {% if user and user.gender == 'male' %}checked{% endif %}>
                <label for="male">Male</label>
                
                <input type="radio" name="gender" value="female" id="female" {% if user and user.gender == 'female' %}checked{% endif %}>
                <label for="female">Female</label>
                
                <input type="radio" name="gender" value="others" id="others" {% if user and user.gender == 'others' %}checked{% endif %}>
                <label for="others">Others</label>
            </div>

            <button type="submit" class="btn-edit">Save Changes</button>
        </form> </div>

    <script>
        // 1. LOGIK UNTUK TUKAR NAMA DI HEADER secara "Real-time"
        const inputName = document.getElementById('username');
        const displayName = document.getElementById('display-name');

        if (inputName) {
            inputName.addEventListener('input', function() {
                if (this.value.trim() === "") {
                    displayName.textContent = "Name's AssignMate";
                } else {
                    displayName.textContent = this.value + "'s AssignMate";
                }
            });
        }

        // 2. LOGIK UNTUK PREVIEW GAMBAR SEBELUM SUBMIT
        const uploadPhoto = document.getElementById('upload-photo');
        const profilePic = document.getElementById('profile-pic');

        uploadPhoto.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    profilePic.src = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>

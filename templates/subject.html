<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ code }} - Assignments</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="dashboard">

        <div class="topbar">
            <div class="brand">
                <img src="{{ url_for('static', filename='images/Assignmate 2.png') }}" alt="Logo" class="brand-logo">
                <a href="{{ url_for('dashboard') }}">
                    <span>AssignMate</span>
                </a>
            </div>
            
            <div class="search-container" style="flex-grow: 1; display: flex; justify-content: center;">
                <form action="{{ url_for('subject', code=code) }}" method="GET" style="display: inline-flex; align-items: center; background: #fff; border: 1px solid #ccc; border-radius: 20px; padding: 5px 15px; width: 100%; max-width: 400px;">
                    <input 
                        type="text" 
                        name="search" 
                        placeholder="Search assignments in {{ code }}..." 
                        value="{{ search_query or '' }}" 
                        style="border: none; outline: none; width: 100%; font-size: 14px; background: transparent; color: #000;"
                    >
                    <button type="submit" style="background: none; border: none; cursor: pointer; color: #555;">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>
            </div>
            
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="filter-section">
                    <form method="GET" action="{{ url_for('subject', code=code) }}">
                        <input type="hidden" name="search" value="{{ search_query }}">
                        
                        <div class="nav-item dropdown">
                            <button type="button" class="topbar-btn"><i class="fa-solid fa-filter"></i> Filter</button>
                            
                            <div class="dropdown-content">
                                <div class="filter-group">
                                    <label for="status_filter">Status</label>
                                    <select name="status" id="status_filter">
                                        <option value="all" {% if status_filter == 'all' or not status_filter %}selected{% endif %}>All Status</option>
                                        <option value="to_do" {% if status_filter == 'to_do' %}selected{% endif %}>To Do</option>
                                        <option value="ongoing" {% if status_filter == 'ongoing' %}selected{% endif %}>On Going</option>
                                        <option value="completed" {% if status_filter == 'completed' %}selected{% endif %}>Complete</option>
                                    </select>
                                </div>
                                <button type="submit" class="apply-btn">Apply Filter</button>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="settings-link">
                    <a href="/editprofile" class="topbar-btn"><i class="fa-solid fa-gear"></i></a>    
                </div>
                
                <div class="analytics-link">
                    <a href="{{ url_for('analytics') }}" class="topbar-btn"><i class="fa-solid fa-chart-line"></i></a>
                </div>

                <button id="openTimer" class="topbar-btn"><i class="fa-solid fa-stopwatch"></i></button>

                <div class="calendar-link">
                    <a href="{{ url_for('calendar_view') }}" class="topbar-btn"><i class="fa-solid fa-calendar"></i></a>
                </div>
            </div>

            <div class="personal-chat-link">
                    <a href="{{ url_for('personal_chat') }}" class="topbar-btn"><i class="fa-solid fa-comments"></i></a>
                </div>
            </div>
        </div>

        </div>

        <h1>{{ code }}</h1>

        <div class="cards">
            {% for assignment in assignments %}
                <div class="card-container" style="position: relative; display: block;">
                    
                    <a href="{{ url_for('assignment', id=assignment['id']) }}" style="text-decoration: none; color: inherit; display: block;">
                        <div class="card" style="padding-bottom: 45px; position: relative;">
                            {{ assignment['title'] }}
                            <div class="due-date"></div>
                            <strong>Due Date:</strong> {{ assignment['deadline'] }}
                        </div>
                    </a>
                    
                    <form action="{{ url_for('delete_assignment', id=assignment['id']) }}" method="POST" onsubmit="return confirm('Are you sure you want to delete the assignment \'{{ assignment['title'] }}\'?');" style="position: absolute; bottom: 15px; right: 15px; z-index: 10;">
                        <button type="submit" class="btn-delete-card" title="Delete Assignment">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </form>

                </div>
            {% else %}
                <p class="no-data" style="grid-column: 1 / -1; color: #777; font-style: italic;">No assignments found match your search query.</p>
            {% endfor %}
        </div>

    </div>

    <div class="right">
        <div id="pomodoroPopup" class="pomodoro-popup" style="display: none;">
            <div class="popup-header">
                <span id="mode">Work Time</span>
                <button id="closeTimer">&times;</button>
            </div>
            <h1 id="timer">25:00</h1>
            <div class="buttons">
                <button onclick="startTimer()">Start</button>
                <button onclick="pauseTimer()">Pause</button>
                <button onclick="resetTimer()">Reset</button>
            </div>
        </div>
    </div>
         <script src="{{ url_for('static', filename='pomodoro.js') }}"></script>
</body>
</html>

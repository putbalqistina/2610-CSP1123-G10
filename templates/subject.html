<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Subject</title>

<link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="dashboard">

    <!-- Topbar -->

        <div class="topbar">
            <div class="brand">
                <img src="{{ url_for('static', filename='images/Assignmate 2.png') }}" alt="Logo" class="brand-logo">
                <span>AssignMate</span>
            </div>
            
            <div class="search-bar">
                <input type="text" placeholder="Search 🔍︎">
            </div>
            
            <div style="display: flex; align-items: center; gap: 15px;">
                

                <div class="settings-link">
                    <a href="/editprofile"  class="topbar-btn">
                        <i class="fa-solid fa-gear"></i>
                    </a>    
                </div>
                
                <div class="analytics-link">
                    <a href="{{ url_for('analytics') }}" class="topbar-btn">
                        <i class="fa-solid fa-chart-line"></i>
                
                    </a>
                </div>

                <button id="openTimer" class="topbar-btn">
                    <i class="fa-solid fa-stopwatch"></i>
                </button>

                <div class="calendar-link">
                    <a href="{{ url_for('calendar_view') }}" class="topbar-btn">
                        <i class="fa-solid fa-calendar"></i>
                    </a>
                </div>
            </div>
        </div>




    <!-- Title -->
    <h1>{{ code }} Assignments</h1>

    <!-- Cards -->
    <div class="cards">
        {% for assignment in assignments %}
        <a href="{{ url_for('assignment', title=assignment) }}">
            <div class="card">
                {{ assignment }}
            </div>
        </a>
    {% endfor %}

    </div>

</div>

</body>
</html>

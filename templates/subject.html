<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Subject</title>

<link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

 <div class="dashboard">

        <div class="topbar">
            <div class="brand">
                <img src="{{ url_for('static', filename='images/Assignmate 2.png') }}" alt="Logo" class="brand-logo">
                <a href="{{ url_for('dashboard') }}">
                    <span>AssignMate</span></a>
            </div>
            
            <div class="search-bar">
                <input type="text" placeholder="Search 🔍︎">
            </div>
            
            <div style="display: flex; align-items: center; gap: 15px;">
                
                <div class="nav-item dropdown">
                    <button class="topbar-btn"><i class="fa-solid fa-filter"></i>Filter
                    </button>
                    <div class="dropdown-content">
                        <form action="/dashboard" method="GET">
                            <div class="filter-group">
                                <label for="subject_filter">Subject</label>
                                <select name="subject_filter" id="subject_filter">
                                    <option value="All" {% if request.args.get('subject_filter') == 'All' or not request.args.get('subject_filter') %}selected{% endif %}>All Subjects</option>
                                    {% for subject in subjects %}
                                        <option value="{{ subject }}" {% if request.args.get('subject_filter') == subject %}selected{% endif %}>{{ subject }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <button type="submit" class="apply-btn">Apply Filter</button>
                        </form>
                    </div>
                </div>

                <div class="settings-link">
                    <a href="/editprofile"  class="topbar-btn">
                        <i class="fa-solid fa-gear"></i>
                    </a>    
                </div>
                
                <div class="analytics-link">
                    <a href="{{ url_for('analytics') }}" class="topbar-btn">
                        <i class="fa-solid fa-chart-line"></i>
                
                    </a>
                </div>

                <button id="openTimer" class="topbar-btn">
                    <i class="fa-solid fa-stopwatch"></i>
                </button>

                <div class="calendar-link">
                    <a href="{{ url_for('calendar_view') }}" class="topbar-btn">
                        <i class="fa-solid fa-calendar"></i>
                    </a>
                </div>

                <div class="personal-chat-link">
                    <a href="{{ url_for('personal_chat') }}" class="topbar-btn">
                        <i class="fa-solid fa-comments"></i>
                    </a>
                </div>
            </div>
        </div>




    <!-- Title -->
    <h1>{{ code }} Assignments</h1>

    <!-- Cards -->
    <div class="cards">
    {% for assignment in assignments %}
        <a href="{{ url_for('assignment', title=assignment['title']) }}">
            <div class="card">
                {{ assignment['title'] }}
            </div>
        </a>
    {% endfor %}
</div>

</div>

</body>
</html>

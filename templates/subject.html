<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Subject</title>

<link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>

<body>

<div class="dashboard">

    <!-- Topbar -->
<div class="topbar">
    <div>AssignMate</div>
    
    <input type="text" placeholder="Search 🔍︎">

    <!-- Kelompok Kanan: Filter & Settings -->
    <div style="display: flex; align-items: center; gap: 15px;">
    
    <!-- Dropdown Filter -->
            <div class="nav-item dropdown">
            <span class="filter-btn">Notifications | Filter ▾</span>
                <div class="dropdown-content">
                    <div class="filter-group">
                        <label>Status</label>
                        <select>
                            <option>All Status</option>
                            <option>Completed</option>
                            <option>Not Completed</option>
                        </select>
                    </div>
                    
                    
                    <button type="button" class="apply-btn">Apply Filter</button>
                </div>
            </div>
            <!-- Ikon Edit Profile (Settings) -->
        <div class="settings-link">
            <a href="/edit_profile" style="text-decoration: none; cursor: pointer; font-size: 20px;">
                🌣
            </a>
        </div>
        </div> 
    </div> 


    <!-- Title -->
    <h1>{{ code }} Assignments</h1>

    <!-- Cards -->
    <div class="cards">
        {% for assignment in assignments %}
        <a href="/assignment/{{ assignment }}">
            <div class="card">
                {{ assignment }}
            </div>
        </a>
    {% endfor %}

    </div>

</div>

</body>
</html>

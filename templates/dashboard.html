<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>

<body>



<div class="dashboard">

    <!-- Topbar -->
    <div class="topbar">
        <div>AssignMate</div>
        <input type="text" placeholder="Search 🔍︎">
        <div>Notifications | Filter</div>
        <div>🌣</div>
    </div>

    <!-- Title -->
    <h1>Your Dashboard</h1>

    <!-- Cards -->
    <div class="cards">
     {%if subjects %}
        {% for subject in subjects %}
            <a href="{{ url_for('subject', code=subject.code) }}">
                <div class="card">
                    {{ subject.code }} - {{ subject.name }}
                </div>
            </a>
        {% endfor %}
        {% else %}
        <p> No Assignments yet. Click + to add.</p>
        {% endif %}
    </div>

    <button class="add-btn" onclick="window.location.href='/add-assignment'"> ✚</button>

</div>

<button id="openTimer">Open Timer> Pomodoro </button>
<div id="pomodoroModal" class="modal">
    <div class="modal-content">
        <h2 id="mode">Work Time</h2>
        <h1 id="timer">25:00</h1>

        <button onclick="startTimer()">Start</button>
        <button onclick="pauseTimer()">Pause</button>
        <button onclick="resetTimer()">Reset</button>
    </div>
</div>

<script src="{{ url_for('static', filename='js/pomodoro.js') }}"></script>

</body>
</html>

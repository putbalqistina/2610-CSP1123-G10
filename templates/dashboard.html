<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>

<body>



<div class="dashboard">

    <!-- Topbar -->
    <div class="topbar">
        <div>AssignMate</div>
        <input type="text" placeholder="Search 🔍︎">
        <div>Notifications | Filter</div>
        <div>🌣</div>
    </div>

<div class="right">

    <button id="openTimer" class="btn">⏱️</button>

    <div id="pomodoroPopup" class="pomodoro-popup">

        <div class="popup-header">
            <span id="mode">Work Time</span>
            <button id="closeTimer">&times;</button>
        </div>

        <h1 id="timer">25:00</h1>

        <div class="buttons">
            <button onclick="startTimer()">Start</button>
            <button onclick="pauseTimer()">Pause</button>
            <button onclick="resetTimer()">Reset</button>
        </div>

    </div>

</div>

    <!-- Title -->
    <h1>Your Dashboard</h1>

    <!-- Cards -->
    <div class="cards">
     {%if subjects %}
        {% for subject in subjects %}
            <a href="{{ url_for('subject', code=subject.code) }}">
                <div class="card">
                    {{ subject.code }} - {{ subject.name }}
                </div>
            </a>
        {% endfor %}
        {% else %}
        <p> No Assignments yet. Click + to add.</p>
        {% endif %}
    </div>

    <button class="add-btn" onclick="window.location.href='/add-assignment'"> ✚</button>

</div>


<script src="{{ url_for('static', filename='pomodoro.js') }}"></script>

</body>
</html>

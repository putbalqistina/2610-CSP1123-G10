<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>

<body>

    
<button class="add-btn" onclick="window.location.href='/add_assignment'">+</button>
<div class="dashboard">

    <!-- Topbar -->
<div class="topbar">
    <div>AssignMate</div>
    
    <input type="text" placeholder="Search 🔍︎">

    <!-- Kelompok Kanan: Filter & Settings -->
    <div style="display: flex; align-items: center; gap: 15px;">
        
        <!-- Dropdown Filter -->
        <div class="nav-item dropdown">
            <span class="filter-btn">Notifications | Filter ▾</span>
            <div class="dropdown-content">
                <div class="filter-group">
                    <label>Subject</label>
                    <select>
                        <option>All Subjects</option>
                        {% for s in subjects %}
                            <option>{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="button" class="apply-btn">Apply Filter</button>
            </div>
        </div>

        <!-- Ikon Edit Profile (Settings) -->
        <div class="settings-link">
            <a href="/edit_profile" style="text-decoration: none; cursor: pointer; font-size: 20px;">
                🌣
            </a>
        </div>
    </div>
</div>

    <!-- Title -->
    <h1>Your Dashboard</h1>

    <!-- Cards -->
    <div class="cards">
     {%if subjects %}
        {% for subject in subjects %}
            <a href="/subject/{{ subject.code }}">
                <div class="card">
                    {{ subject.code }} - {{ subject.name }}
                </div>
            </a>
        {% endfor %}
        {% else %}
        <p> No Assignments yet. Click + to add.</p>
        {% endif %}
    </div>

</div>


</body>
</html>
